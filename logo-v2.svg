<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 106" fill="none" role="img" aria-label="Sai Bharadwaj — Strategy Advisor">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400&amp;family=Cormorant+Garamond:ital,wght@1,300;1,400&amp;family=DM+Sans:opsz,wght@9..40,300&amp;display=swap');
    </style>
  </defs>

  <!-- ── "Sai" — large italic, gold ── -->
  <text
